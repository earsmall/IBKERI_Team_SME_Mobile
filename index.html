<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>경제·금융 모니터</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-shell">
      <section class="app-frame">
        <header class="app-header">
          <div class="topbar">
            <div>
              <p class="brand-kicker">IBK경제연구소</p>
              <h1>한국 중소기업 요약노트</h1>
            </div>
          </div>

          <nav class="tab-strip" aria-label="대시보드 탭">
            <button class="tab-button is-active" type="button" data-tab="sme">위상</button>
            <button class="tab-button" type="button" data-tab="startup">창업</button>
          </nav>
        </header>

        <section class="tab-panel is-active" data-panel="sme">
          <div class="info-section">
            <div class="section-head">
              <div>
                <h2>기업수, 종사자수, 매출액</h2>
                <p class="section-subcopy">최근 3년 전국 전산업 중소기업 기준</p>
                <p class="section-subcopy">자료: 중소벤처기업부 중소기업 기본통계</p>
              </div>
              <label class="year-select-wrap" for="sme-year-select">
                <span class="year-select-label">기준년도</span>
                <select id="sme-year-select" class="year-select"></select>
              </label>
            </div>
            <div class="sme-grid" id="sme-grid"></div>
            <div class="sme-charts" id="sme-charts"></div>
          </div>
        </section>

        <section class="tab-panel" data-panel="startup">
          <div class="info-section">
            <div class="section-head">
              <div>
                <h2>창업기업수와 기술기반업종 비중</h2>
                <p class="section-subcopy">최신 연도 기준 요약과 연도별 추이</p>
                <p class="section-subcopy">자료: 중소벤처기업부 창업기업동향</p>
              </div>
              <label class="year-select-wrap" for="startup-year-select">
                <span class="year-select-label">기준년도</span>
                <select id="startup-year-select" class="year-select"></select>
              </label>
            </div>
            <div class="startup-summary" id="startup-summary"></div>
            <div class="startup-charts" id="startup-charts"></div>
          </div>
        </section>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
