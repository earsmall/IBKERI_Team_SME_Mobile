<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>경제·금융 모니터</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-shell">
      <section class="app-frame">
        <header class="app-header">
          <div class="topbar">
            <div>
              <p class="brand-kicker">IBK경제연구소</p>
              <h1>한국 중소기업 요약노트</h1>
            </div>
          </div>

          <nav class="tab-strip" aria-label="대시보드 탭">
            <button class="tab-button is-active" type="button" data-tab="sme">위상</button>
            <button class="tab-button" type="button" data-tab="export">수출</button>
            <button class="tab-button" type="button" data-tab="loan">대출</button>
            <button class="tab-button" type="button" data-tab="investment">투자</button>
            <button class="tab-button" type="button" data-tab="startup">창업</button>
          </nav>
        </header>

        <section class="tab-panel is-active" data-panel="sme">
          <div class="info-section">
            <div class="section-head">
              <div>
                <h2>기업수, 종사자수, 매출액</h2>
                <p class="section-subcopy">자료: 중소벤처기업부 《중소기업 기본통계》</p>
              </div>
              <label class="year-select-wrap" for="sme-year-select">
                <span class="year-select-label">기준년도</span>
                <select id="sme-year-select" class="year-select"></select>
              </label>
            </div>
            <div class="sme-grid" id="sme-grid"></div>
            <div class="sme-charts" id="sme-charts"></div>
          </div>
        </section>

        <section class="tab-panel" data-panel="startup">
          <div class="info-section">
            <div class="section-head">
              <div>
                <h2>창업기업수와 기술기반업종 비중</h2>
                <p class="section-subcopy">자료: 중소벤처기업부 《창업기업동향》</p>
              </div>
              <label class="year-select-wrap" for="startup-year-select">
                <span class="year-select-label">기준년도</span>
                <select id="startup-year-select" class="year-select"></select>
              </label>
            </div>
            <div class="startup-summary" id="startup-summary"></div>
            <div class="startup-charts" id="startup-charts"></div>
          </div>
        </section>

        <section class="tab-panel" data-panel="loan">
          <div class="info-section">
            <div class="section-head">
              <div>
                <h2>은행권 중소기업대출 및 연체율</h2>
                <p class="section-subcopy">자료: 한국은행, 금융감독원</p>
              </div>
              <label class="year-select-wrap" for="loan-year-select">
                <span class="year-select-label">기준년도</span>
                <select id="loan-year-select" class="year-select"></select>
              </label>
            </div>
            <div class="startup-summary" id="loan-summary"></div>
            <div class="startup-charts" id="loan-charts"></div>
          </div>
        </section>

        <section class="tab-panel" data-panel="investment">
          <div class="info-section">
            <div class="section-head">
              <div>
                <h2>벤처투자</h2>
                <p class="section-subcopy">자료: 중소벤처기업부, 한국벤처캐피탈협회</p>
              </div>
              <label class="year-select-wrap" for="investment-date-select">
                <span class="year-select-label">기준시점</span>
                <select id="investment-date-select" class="year-select"></select>
              </label>
            </div>
            <div class="startup-summary" id="investment-summary"></div>
            <div class="startup-charts" id="investment-charts"></div>
          </div>
        </section>

        <section class="tab-panel" data-panel="export">
          <div class="info-section">
            <div class="section-head">
              <div>
                <h2>중소기업 수출</h2>
                <p class="section-subcopy">자료: 국가데이터처 《기업특성별무역통계》</p>
              </div>
              <label class="year-select-wrap" for="export-date-select">
                <span class="year-select-label">기준시점</span>
                <select id="export-date-select" class="year-select"></select>
              </label>
            </div>
            <div class="startup-summary" id="export-summary"></div>
            <div class="startup-charts" id="export-charts"></div>
          </div>
        </section>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
