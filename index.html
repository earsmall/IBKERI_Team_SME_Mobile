<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>경제·금융 모니터</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="phone-shell">
      <section class="app-frame">
        <header class="app-header">
          <div class="topbar">
            <div>
              <p class="brand-kicker">IBK경제연구소</p>
              <h1>Mobile Dashboard</h1>
            </div>
          </div>

          <div class="meta-row">
            <span class="meta-pill" id="last-updated">업데이트 대기</span>
          </div>

          <nav class="tab-strip" aria-label="대시보드 탭">
            <div class="tab-action-group">
              <button class="tab-button is-active" type="button" data-tab="financial">
                실시간 금융시장
              </button>
              <button
                class="icon-refresh-button"
                id="refresh-button"
                type="button"
                aria-label="실시간 금융시장 새로고침"
                title="실시간 금융시장 새로고침"
              ></button>
            </div>
            <button class="tab-button" type="button" data-tab="sme">중소기업 위상</button>
          </nav>
        </header>

        <section class="tab-panel is-active" data-panel="financial">
          <div class="market-list" id="market-list"></div>
        </section>

        <section class="tab-panel" data-panel="sme">
          <div class="info-section">
            <div class="section-head">
              <div>
                <h2>기업수, 종사자수, 매출액</h2>
                <p class="section-subcopy">최근 3년 전국 전산업 중소기업 기준</p>
              </div>
              <label class="year-select-wrap" for="sme-year-select">
                <span class="year-select-label">연도</span>
                <select id="sme-year-select" class="year-select"></select>
              </label>
            </div>
            <div class="sme-grid" id="sme-grid"></div>
          </div>
        </section>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
